scraper:
  time_range_days: 365
  max_reviews_per_game: 5000   # 每个地区最多采集条数，多地区时总条数 = 地区数 × 此值（去重后可能更少）
  delay_between_requests: 2
  retry_times: 3
  # 全球多地区：只保留“有差异”的地区。英/加/澳/印与美国评论高度重复，故只保留美国代表英语区，其余为不同语言/市场
